name: Lint Docker Compose

on:
  workflow_call:
    outputs:
      actionlint-result:
        description: "Result of actionlint validation (success/failure/skipped)"
        value: ${{ jobs.lint.outputs.actionlint-result }}
      lint-result:
        description: "Result of stack lint validation (success/failure/skipped)"
        value: ${{ jobs.lint.outputs.lint-result }}
    inputs:
      stacks:
        description: "JSON array of stack names to lint"
        required: true
        type: string
      webhook-url:
        description: "1Password reference to Discord webhook URL"
        required: true
        type: string
      repo-name:
        description: "Repository display name for notifications"
        required: true
        type: string
      target-repository:
        description: "Target repository to checkout (owner/repo-name)"
        required: true
        type: string
      target-ref:
        description: "Git reference to checkout from target repository"
        required: false
        type: string
        default: 'main'
      discord-user-id:
        description: "Discord user ID to mention in failure notifications (e.g., '<@123456789>')"
        required: false
        type: string
        default: ''
      runner:
        description: "Runner label(s) for jobs (e.g., 'ubuntu-24.04' or 'self-hosted')"
        required: false
        type: string
        default: 'ubuntu-24.04'
      platforms:
        description: "Comma-separated target platforms to verify digest-pinned images publish (e.g. 'linux/arm64/v8' or 'linux/amd64'). Guards against Docker Hub publish-race bugs where an index manifest is pushed before its per-platform children."
        required: false
        type: string
        default: 'linux/amd64'

jobs:
  # Single job: actionlint + all stack validations run on ONE runner.
  # Previously a matrix spun up a separate runner per stack (plus standalone
  # actionlint/lint-summary/results jobs); that wasted runner startup time for
  # what are two fast shell scripts. The loop below replicates the matrix's
  # fail-fast:false behaviour with a failed=() array.
  lint:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    outputs:
      actionlint-result: ${{ steps.results.outputs.actionlint-result }}
      lint-result: ${{ steps.results.outputs.lint-result }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Checkout compose-workflow for linting scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: owine/compose-workflow
          ref: main
          path: .compose-workflow

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reusable workflow: ${{ github.workflow_ref }}"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run actionlint
        id: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        continue-on-error: true

      - name: Validate stacks
        id: stacks
        continue-on-error: true
        env:
          STACKS: ${{ inputs.stacks }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -uo pipefail

          mapfile -t stack_list < <(jq -r '.[]' <<< "$STACKS")
          if [[ ${#stack_list[@]} -eq 0 ]]; then
            echo "ℹ️  No stacks to validate"
            exit 0
          fi

          echo "📁 Validating ${#stack_list[@]} stack(s): ${stack_list[*]}"

          # fail-fast:false — keep validating every stack, collect the failures.
          failed=()
          for stack in "${stack_list[@]}"; do
            echo ""
            echo "════════════════════════════════════════════════════════════════"
            echo "▶ Stack: $stack"
            echo "════════════════════════════════════════════════════════════════"
            stack_ok=true

            if ! ./.compose-workflow/scripts/linting/validate-stack.sh \
                --stack "$stack" \
                --yamllint-config .yamllint; then
              stack_ok=false
            fi

            if ! ./.compose-workflow/scripts/linting/validate-image-platforms.sh \
                --stack "$stack" \
                --platforms "$PLATFORMS"; then
              stack_ok=false
            fi

            if [[ "$stack_ok" != "true" ]]; then
              failed+=("$stack")
              echo "💥 Stack '$stack' FAILED validation"
            else
              echo "✅ Stack '$stack' passed validation"
            fi
          done

          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "📋 LINT SUMMARY"
          echo "════════════════════════════════════════════════════════════════"
          echo "   Total:  ${#stack_list[@]}"
          echo "   Passed: $(( ${#stack_list[@]} - ${#failed[@]} ))"
          echo "   Failed: ${#failed[@]}"
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo ""
            echo "💥 Failed stacks:"
            for s in "${failed[@]}"; do
              echo "   • $s"
            done
            echo ""
            echo "🛠️  Reproduce locally:"
            echo "   yamllint --strict --config-file .yamllint <stack>/compose.yaml"
            echo "   docker compose -f <stack>/compose.yaml config"
            exit 1
          fi
          echo ""
          echo "🎉 All stacks passed validation"

      - name: Collect results and gate
        id: results
        if: always()
        env:
          ACTIONLINT_OUTCOME: ${{ steps.actionlint.outcome }}
          STACKS_OUTCOME: ${{ steps.stacks.outcome }}
        run: |
          # Expose step outcomes as job outputs for the caller's notify job.
          # steps.<id>.outcome is one of success/failure/skipped/cancelled,
          # matching the success|skipped contract compose-notify.yml expects.
          echo "actionlint-result=$ACTIONLINT_OUTCOME" >> "$GITHUB_OUTPUT"
          echo "lint-result=$STACKS_OUTCOME" >> "$GITHUB_OUTPUT"

          echo "⚙️  Workflow validation (actionlint): $ACTIONLINT_OUTCOME"
          echo "📋 Stack validation:                 $STACKS_OUTCOME"

          # Outputs are written above (and captured) before we fail the job, so
          # the gate failing still propagates results to downstream needs jobs.
          if [[ "$ACTIONLINT_OUTCOME" != "success" || "$STACKS_OUTCOME" != "success" ]]; then
            echo "::error::Lint failed (actionlint=$ACTIONLINT_OUTCOME, stacks=$STACKS_OUTCOME)"
            exit 1
          fi
          echo "🎉 All lint checks passed"
