name: Lint Docker Compose

on:
  workflow_call:
    outputs:
      actionlint-result:
        description: "Result of actionlint job (success/failure/skipped)"
        value: ${{ jobs.results.outputs.actionlint-result }}
      lint-result:
        description: "Result of lint matrix job (success/failure/skipped)"
        value: ${{ jobs.results.outputs.lint-result }}
    inputs:
      stacks:
        description: "JSON array of stack names to lint"
        required: true
        type: string
      webhook-url:
        description: "1Password reference to Discord webhook URL"
        required: true
        type: string
      repo-name:
        description: "Repository display name for notifications"
        required: true
        type: string
      target-repository:
        description: "Target repository to checkout (owner/repo-name)"
        required: true
        type: string
      target-ref:
        description: "Git reference to checkout from target repository"
        required: false
        type: string
        default: 'main'
      discord-user-id:
        description: "Discord user ID to mention in failure notifications (e.g., '<@123456789>')"
        required: false
        type: string
        default: ''
      runner:
        description: "Runner label(s) for jobs (e.g., 'ubuntu-24.04' or 'self-hosted')"
        required: false
        type: string
        default: 'ubuntu-24.04'

jobs:
  actionlint:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo ""
          echo "ℹ️  Reusable workflow SHA shown in 'Uses:' line above"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  lint:
    strategy:
      matrix:
        stack: ${{ fromJson(inputs.stacks) }}
      fail-fast: false
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Checkout compose-workflow for linting scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: owine/compose-workflow
          ref: main
          path: .compose-workflow

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reusable workflow: ${{ github.workflow_ref }}"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Stack: ${{ matrix.stack }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run stack validation
        run: |
          ./.compose-workflow/scripts/linting/validate-stack.sh \
            --stack "${{ matrix.stack }}" \
            --yamllint-config .yamllint

      - name: Report lint status
        if: always()
        run: |
          echo "📊 Final Status for Stack: ${{ matrix.stack }}"
          echo ""
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "🎉 STACK VALIDATION: PASSED"
            echo "   Stack '${{ matrix.stack }}' passed all validation checks"
            echo "   ✅ YAML linting (yamllint)"
            echo "   ✅ Docker Compose validation (docker compose config)"
          else
            echo "💥 STACK VALIDATION: FAILED"
            echo "   Stack '${{ matrix.stack }}' has validation issues"
            echo "   See detailed error output above for resolution steps"
          fi


  lint-summary:
    runs-on: ${{ inputs.runner }}
    needs: [actionlint, lint]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Checkout compose-workflow for linting scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: owine/compose-workflow
          ref: main
          path: .compose-workflow

      - name: 📊 Generate detailed summary with error reproduction
        run: |
          ./.compose-workflow/scripts/linting/lint-summary.sh \
            --stacks '${{ inputs.stacks }}' \
            --yamllint-config .yamllint \
            --actionlint-result "${{ needs.actionlint.result }}" \
            --lint-result "${{ needs.lint.result }}"

  results:
    runs-on: ${{ inputs.runner }}
    needs: [actionlint, lint]
    if: always()
    timeout-minutes: 1
    outputs:
      actionlint-result: ${{ steps.collect.outputs.actionlint-result }}
      lint-result: ${{ steps.collect.outputs.lint-result }}
    steps:
      - name: Collect job results
        id: collect
        env:
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          LINT_RESULT: ${{ needs.lint.result }}
        run: |
          echo "actionlint-result=$ACTIONLINT_RESULT" >> "$GITHUB_OUTPUT"
          echo "lint-result=$LINT_RESULT" >> "$GITHUB_OUTPUT"
