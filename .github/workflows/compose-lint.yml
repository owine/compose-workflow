name: Lint Docker Compose

on:
  workflow_call:
    inputs:
      stacks:
        description: "JSON array of stack names to lint"
        required: true
        type: string
      webhook-url:
        description: "1Password reference to Discord webhook URL"
        required: true
        type: string
      repo-name:
        description: "Repository display name for notifications"
        required: true
        type: string
      target-repository:
        description: "Target repository to checkout (owner/repo-name)"
        required: true
        type: string
      target-ref:
        description: "Git reference to checkout from target repository"
        required: false
        type: string
        default: 'main'
      discord-user-id:
        description: "Discord user ID to mention in failure notifications (e.g., '<@123456789>')"
        required: false
        type: string
        default: ''
      runner:
        description: "Runner label(s) for jobs (e.g., 'ubuntu-24.04' or 'self-hosted')"
        required: false
        type: string
        default: 'ubuntu-24.04'

jobs:
  actionlint:
    name: Workflow validation
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo ""
          echo "ℹ️  Reusable workflow SHA shown in 'Uses:' line above"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  lint:
    strategy:
      matrix:
        stack: ${{ fromJson(inputs.stacks) }}
      fail-fast: false
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Checkout compose-workflow for linting scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: owine/compose-workflow
          ref: main
          path: .compose-workflow

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reusable workflow: ${{ github.workflow_ref }}"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Stack: ${{ matrix.stack }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run stack validation
        run: |
          ./.compose-workflow/scripts/linting/validate-stack.sh \
            --stack "${{ matrix.stack }}" \
            --yamllint-config .yamllint

      - name: Report lint status
        if: always()
        run: |
          echo "📊 Final Status for Stack: ${{ matrix.stack }}"
          echo ""
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "🎉 STACK VALIDATION: PASSED"
            echo "   Stack '${{ matrix.stack }}' passed all validation checks"
            echo "   ✅ YAML linting (yamllint)"
            echo "   ✅ Docker Compose validation (docker compose config)"
          else
            echo "💥 STACK VALIDATION: FAILED"
            echo "   Stack '${{ matrix.stack }}' has validation issues"
            echo "   See detailed error output above for resolution steps"
          fi


  lint-summary:
    name: Lint Summary
    runs-on: ${{ inputs.runner }}
    needs: [actionlint, lint]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Checkout compose-workflow for linting scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: owine/compose-workflow
          ref: main
          path: .compose-workflow

      - name: 📊 Generate detailed summary with error reproduction
        run: |
          ./.compose-workflow/scripts/linting/lint-summary.sh \
            --stacks '${{ inputs.stacks }}' \
            --yamllint-config .yamllint \
            --actionlint-result "${{ needs.actionlint.result }}" \
            --lint-result "${{ needs.lint.result }}"

  notify:
    name: Discord Notification
    runs-on: ${{ inputs.runner }}
    needs: [actionlint, lint]
    if: always()
    steps:
      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load Discord webhook and user ID
        id: op-load-discord
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
        env:
          DISCORD_WEBHOOK: ${{ inputs.webhook-url }}
          DISCORD_USER_ID: ${{ inputs.discord-user-id != '' && inputs.discord-user-id || 'SKIP' }}

      - name: Determine overall lint status
        id: lint-status
        run: |
          ACTIONLINT="${{ needs.actionlint.result }}"
          LINT="${{ needs.lint.result }}"

          if [[ "$ACTIONLINT" == "success" && "$LINT" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1.16.0
        if: ${{ steps.lint-status.outputs.result == 'failure' || (steps.lint-status.outputs.result == 'success' && github.event_name != 'pull_request') }}
        with:
          webhook: ${{ steps.op-load-discord.outputs.DISCORD_WEBHOOK }}
          content: ${{ steps.lint-status.outputs.result != 'success' && inputs.discord-user-id != '' && steps.op-load-discord.outputs.DISCORD_USER_ID != 'SKIP' && format('<@{0}>', steps.op-load-discord.outputs.DISCORD_USER_ID) || '' }}
          status: ${{ steps.lint-status.outputs.result == 'success' && 'success' || 'failure' }}
          title: "🔍 ${{ inputs.repo-name }} • ${{ steps.lint-status.outputs.result == 'success' && 'Validation Passed' || 'Validation Failed' }}"
          description: |
            ${{ steps.lint-status.outputs.result == 'success' && '✅ **All validation checks passed**' || '❌ **Validation issues detected**' }}

            **⚙️ Workflow Validation:** ${{ needs.actionlint.result == 'success' && '✅ All workflows valid' || '❌ Issues detected' }}
            **📋 Code Quality:** ${{ needs.lint.result == 'success' && '✅ All stacks valid' || '❌ Issues detected' }}

            **📂 Validated Stacks:** `${{ join(fromJson(inputs.stacks), '`, `') }}`

            ${{ github.event_name == 'pull_request' && '🔀 **Pull Request Validation**' || github.event_name == 'workflow_dispatch' && '🔧 **Manual Validation**' || format('📝 **Push to `{0}`**', github.ref_name) }}

            ${{ needs.actionlint.result == 'failure' && '
            **⚙️ Workflow Issues:**
            • GitHub Actions workflow validation failed
            • Review the **Workflow Validation** job for details
            • Fix workflow syntax, shellcheck, or expression errors
            • Test locally: `actionlint .github/workflows/*.yml`' || '' }}

            ${{ needs.lint.result == 'failure' && '
            **🚨 Action Required:**
            • Review stack validation errors in workflow logs
            • Fix YAML formatting and Docker Compose syntax
            • Test locally: `yamllint --strict stack/compose.yaml`
            • Check the **Lint Summary** job for detailed errors' || '' }}

            ${{ steps.lint-status.outputs.result == 'success' && '🚀 **Ready for deployment**' || '⚠️ **Deployment blocked until issues resolved**' }}
          color: ${{ steps.lint-status.outputs.result == 'success' && 0x28a745 || 0xfd7e14 }}
          username: "Compose Lint"
          avatar_url: "https://cdn-icons-png.flaticon.com/512/2103/2103633.png"

      - name: Unload Discord webhook
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
