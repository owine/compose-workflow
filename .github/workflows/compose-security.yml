name: Security Scanning

on:
  workflow_call:
    outputs:
      gitguardian-result:
        description: "Result of GitGuardian scan (success/failure/skipped)"
        value: ${{ jobs.security.outputs.gitguardian-result }}
      trivy-result:
        description: "Result of Trivy IaC scan (success/failure/skipped)"
        value: ${{ jobs.security.outputs.trivy-result }}
    inputs:
      webhook-url:
        description: "1Password reference to Discord webhook URL"
        required: true
        type: string
      repo-name:
        description: "Repository display name for notifications"
        required: true
        type: string
      target-repository:
        description: "Target repository to checkout (owner/repo-name)"
        required: true
        type: string
      target-ref:
        description: "Git reference to checkout from target repository"
        required: false
        type: string
        default: 'main'
      github-event-before:
        description: "GitHub event before SHA (github.event.before)"
        required: false
        type: string
        default: ''
      github-event-base:
        description: "GitHub event base SHA (github.event.base)"
        required: false
        type: string
        default: ''
      github-pull-base-sha:
        description: "GitHub pull request base SHA (github.event.pull_request.base.sha)"
        required: false
        type: string
        default: ''
      github-default-branch:
        description: "GitHub repository default branch (github.event.repository.default_branch)"
        required: false
        type: string
        default: 'main'
      event-name:
        description: "GitHub event name (github.event_name)"
        required: false
        type: string
        default: 'push'
      discord-user-id:
        description: "Discord user ID to mention in failure notifications (e.g., '<@123456789>')"
        required: false
        type: string
        default: ''
      runner:
        description: "Runner label(s) for jobs (e.g., 'ubuntu-24.04' or 'self-hosted')"
        required: false
        type: string
        default: 'ubuntu-24.04'

jobs:
  # Single job: GitGuardian (push-only) + Trivy run as steps on ONE runner.
  # Previously these were two parallel jobs plus a third 'results' job whose
  # only purpose was to echo the two job results into outputs — three runners
  # for what one runner does. A single shared checkout also replaces two.
  security:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    outputs:
      gitguardian-result: ${{ steps.results.outputs.gitguardian-result }}
      trivy-result: ${{ steps.results.outputs.trivy-result }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}
          fetch-depth: 0  # full history so GitGuardian can scan multiple commits

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reusable workflow: ${{ github.workflow_ref }}"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Event: ${{ inputs.event-name }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # --- GitGuardian (push events only) ---------------------------------
      - name: Configure 1Password Service Account
        if: inputs.event-name == 'push'
        uses: 1password/load-secrets-action/configure@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556  # v4.0.1
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load GitGuardian credentials
        id: op-load-secret
        if: inputs.event-name == 'push'
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556  # v4.0.1
        with:
          unset-previous: true
        env:
          GITGUARDIAN_API_KEY: "op://Docker/gitguardian/api_key"

      - name: Run GitGuardian scan
        id: gitguardian
        if: inputs.event-name == 'push'
        continue-on-error: true
        uses: GitGuardian/ggshield-action@ad41d391f42450e9e6bb34961e3b1cf73398f250 # v1.51.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ inputs.github-event-before }}
          GITHUB_PUSH_BASE_SHA: ${{ inputs.github-event-base }}
          GITHUB_PULL_BASE_SHA: ${{ inputs.github-pull-base-sha }}
          GITHUB_DEFAULT_BRANCH: ${{ inputs.github-default-branch }}
          GITGUARDIAN_API_KEY: ${{ steps.op-load-secret.outputs.GITGUARDIAN_API_KEY }}

      - name: Unload GitGuardian credentials
        if: always() && inputs.event-name == 'push'
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556  # v4.0.1
        with:
          unset-previous: true

      # --- Trivy IaC scan (all events) -----------------------------------
      - name: Run Trivy IaC scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: "."
          exit-code: "1"
          severity: HIGH,CRITICAL
          format: table

      - name: Collect results and gate
        id: results
        if: always()
        env:
          GITGUARDIAN_OUTCOME: ${{ steps.gitguardian.outcome }}
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: |
          # steps.<id>.outcome is success/failure/skipped — on non-push events
          # the gitguardian step is skipped, yielding 'skipped' exactly as the
          # old gitguardian job did. compose-notify treats skipped as passing.
          echo "gitguardian-result=$GITGUARDIAN_OUTCOME" >> "$GITHUB_OUTPUT"
          echo "trivy-result=$TRIVY_OUTCOME" >> "$GITHUB_OUTPUT"

          echo "🔒 GitGuardian: $GITGUARDIAN_OUTCOME"
          echo "🛡️  Trivy IaC:   $TRIVY_OUTCOME"

          # Outputs written above before we fail, so results still propagate.
          if [[ "$GITGUARDIAN_OUTCOME" == "failure" || "$TRIVY_OUTCOME" == "failure" ]]; then
            echo "::error::Security scan failed (gitguardian=$GITGUARDIAN_OUTCOME, trivy=$TRIVY_OUTCOME)"
            exit 1
          fi
          echo "🎉 Security scans passed"
