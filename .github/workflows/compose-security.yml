name: Security Scanning

on:
  workflow_call:
    inputs:
      webhook-url:
        description: "1Password reference to Discord webhook URL"
        required: true
        type: string
      repo-name:
        description: "Repository display name for notifications"
        required: true
        type: string
      target-repository:
        description: "Target repository to checkout (owner/repo-name)"
        required: true
        type: string
      target-ref:
        description: "Git reference to checkout from target repository"
        required: false
        type: string
        default: 'main'
      github-event-before:
        description: "GitHub event before SHA (github.event.before)"
        required: false
        type: string
        default: ''
      github-event-base:
        description: "GitHub event base SHA (github.event.base)"
        required: false
        type: string
        default: ''
      github-pull-base-sha:
        description: "GitHub pull request base SHA (github.event.pull_request.base.sha)"
        required: false
        type: string
        default: ''
      github-default-branch:
        description: "GitHub repository default branch (github.event.repository.default_branch)"
        required: false
        type: string
        default: 'main'
      event-name:
        description: "GitHub event name (github.event_name)"
        required: false
        type: string
        default: 'push'
      discord-user-id:
        description: "Discord user ID to mention in failure notifications (e.g., '<@123456789>')"
        required: false
        type: string
        default: ''

jobs:
  gitguardian:
    name: GitGuardian scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: ${{ inputs.event-name == 'push' }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}
          fetch-depth: 0  # fetch all history so multiple commits can be scanned

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reusable workflow: ${{ github.workflow_ref }}"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo ""
          echo "ℹ️  Reusable workflow SHA shown in 'Uses:' line above"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load GitGuardian credentials
        id: op-load-secret
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
        env:
          GITGUARDIAN_API_KEY: "op://Docker/gitguardian/api_key"

      - name: GitGuardian scan
        run: |
          echo ""
          echo "🔒 Starting GitGuardian security scanning..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

      - name: Run GitGuardian scan
        uses: GitGuardian/ggshield-action@ea5c945e66dc6436d976d4c70519c4ff7cadf9ba # v1.49.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ inputs.github-event-before }}
          GITHUB_PUSH_BASE_SHA: ${{ inputs.github-event-base }}
          GITHUB_PULL_BASE_SHA: ${{ inputs.github-pull-base-sha }}
          GITHUB_DEFAULT_BRANCH: ${{ inputs.github-default-branch }}
          GITGUARDIAN_API_KEY: ${{ steps.op-load-secret.outputs.GITGUARDIAN_API_KEY }}

      - name: GitGuardian scan complete
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "🎉 GITGUARDIAN SECURITY SCAN: PASSED"
            echo "   No secrets or security policy violations detected"
          else
            echo "💥 GITGUARDIAN SECURITY SCAN: FAILED"
            echo "   Security issues detected - review output above for details"
            echo "   Common issues: hardcoded secrets, API keys, passwords in code"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Unload GitGuardian credentials
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true

  trivy:
    name: Trivy IaC scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}

      - name: Display version information
        run: |
          echo "📋 Workflow Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Reusable workflow: ${{ github.workflow_ref }}"
          echo "Target repository: ${{ inputs.target-repository }}"
          echo "Target ref: ${{ inputs.target-ref }}"
          echo "Runner: ${{ runner.os }} ${{ runner.arch }}"
          echo ""
          echo "ℹ️  Reusable workflow SHA shown in 'Uses:' line above"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: "."
          exit-code: "1"
          severity: HIGH,CRITICAL
          format: table

      - name: Trivy scan complete
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "🎉 TRIVY IAC SCAN: PASSED"
            echo "   No HIGH or CRITICAL misconfigurations detected"
          else
            echo "💥 TRIVY IAC SCAN: FAILED"
            echo "   IaC misconfigurations detected - review output above for details"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  notify:
    name: Discord Notification
    runs-on: ubuntu-24.04
    needs: [gitguardian, trivy]
    if: always()
    steps:
      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load Discord webhook and user ID
        id: op-load-discord
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
        env:
          DISCORD_WEBHOOK: ${{ inputs.webhook-url }}
          DISCORD_USER_ID: ${{ inputs.discord-user-id != '' && inputs.discord-user-id || 'SKIP' }}

      - name: Determine overall security status
        id: security-status
        run: |
          GITGUARDIAN="${{ needs.gitguardian.result }}"
          TRIVY="${{ needs.trivy.result }}"

          if [[ ("$GITGUARDIAN" == "success" || "$GITGUARDIAN" == "skipped") && "$TRIVY" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1.16.0
        if: ${{ steps.security-status.outputs.result == 'failure' || (steps.security-status.outputs.result == 'success' && github.event_name != 'pull_request') }}
        with:
          webhook: ${{ steps.op-load-discord.outputs.DISCORD_WEBHOOK }}
          content: ${{ steps.security-status.outputs.result != 'success' && inputs.discord-user-id != '' && steps.op-load-discord.outputs.DISCORD_USER_ID != 'SKIP' && format('<@{0}>', steps.op-load-discord.outputs.DISCORD_USER_ID) || '' }}
          status: ${{ steps.security-status.outputs.result == 'success' && 'success' || 'failure' }}
          title: "🔒 ${{ inputs.repo-name }} • ${{ steps.security-status.outputs.result == 'success' && 'Security Passed' || 'Security Failed' }}"
          description: |
            ${{ steps.security-status.outputs.result == 'success' && '✅ **All security checks passed**' || '❌ **Security issues detected**' }}

            **🔒 Secret Scan:** ${{ needs.gitguardian.result == 'success' && '✅ No secrets detected' || needs.gitguardian.result == 'skipped' && '⏭️ Skipped (PR/manual)' || '❌ Issues found' }}
            **🛡️ IaC Scan:** ${{ needs.trivy.result == 'success' && '✅ No misconfigurations' || '❌ Issues found' }}

            ${{ github.event_name == 'pull_request' && '🔀 **Pull Request Scan**' || github.event_name == 'workflow_dispatch' && '🔧 **Manual Scan**' || format('📝 **Push to `{0}`**', github.ref_name) }}

            ${{ needs.gitguardian.result == 'failure' && '
            **🛡️ Security Alert:**
            • GitGuardian detected potential secrets
            • Review the **GitGuardian Scan** job for details
            • Remove exposed secrets before proceeding
            • **This blocks deployment until resolved**' || '' }}

            ${{ needs.trivy.result == 'failure' && '
            **🚨 IaC Misconfiguration:**
            • Trivy detected HIGH or CRITICAL misconfigurations
            • Review the **Trivy IaC Scan** job for details
            • Fix Docker Compose security issues before proceeding' || '' }}

            ${{ steps.security-status.outputs.result == 'success' && '🚀 **Security checks passed**' || '⚠️ **Deployment blocked until issues resolved**' }}
          color: ${{ steps.security-status.outputs.result == 'success' && 0x28a745 || needs.gitguardian.result == 'failure' && 0xdc3545 || 0xfd7e14 }}
          username: "Compose Security"
          avatar_url: "https://cdn-icons-png.flaticon.com/512/2103/2103633.png"

      - name: Unload Discord webhook
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
