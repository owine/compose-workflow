name: Lint Notification

on:
  workflow_call:
    inputs:
      webhook-url:
        description: "1Password reference to Discord webhook URL"
        required: true
        type: string
      repo-name:
        description: "Repository display name for notifications"
        required: true
        type: string
      stacks:
        description: "JSON array of validated stack names (for display)"
        required: true
        type: string
      gitguardian-result:
        description: "Result of GitGuardian scan job (success/failure/skipped)"
        required: true
        type: string
      trivy-result:
        description: "Result of Trivy IaC scan job (success/failure/skipped)"
        required: true
        type: string
      actionlint-result:
        description: "Result of actionlint job (success/failure/skipped)"
        required: true
        type: string
      lint-result:
        description: "Result of lint matrix job (success/failure/skipped)"
        required: true
        type: string
      discord-user-id:
        description: "Discord user ID to mention in failure notifications (e.g., '<@123456789>')"
        required: false
        type: string
        default: ''
      runner:
        description: "Runner label(s) for jobs (e.g., 'ubuntu-24.04' or 'self-hosted')"
        required: false
        type: string
        default: 'ubuntu-24.04'

jobs:
  notify:
    name: Discord Notification
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load Discord webhook and user ID
        id: op-load-discord
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
        env:
          DISCORD_WEBHOOK: ${{ inputs.webhook-url }}
          DISCORD_USER_ID: ${{ inputs.discord-user-id != '' && inputs.discord-user-id || 'SKIP' }}

      - name: Determine overall status
        id: status
        env:
          GITGUARDIAN: ${{ inputs.gitguardian-result }}
          TRIVY: ${{ inputs.trivy-result }}
          ACTIONLINT: ${{ inputs.actionlint-result }}
          LINT: ${{ inputs.lint-result }}
        run: |
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          if ok "$GITGUARDIAN" && ok "$TRIVY" && ok "$ACTIONLINT" && ok "$LINT"; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1.16.0
        if: ${{ steps.status.outputs.result == 'failure' || (steps.status.outputs.result == 'success' && github.event_name != 'pull_request') }}
        with:
          webhook: ${{ steps.op-load-discord.outputs.DISCORD_WEBHOOK }}
          content: ${{ steps.status.outputs.result != 'success' && inputs.discord-user-id != '' && steps.op-load-discord.outputs.DISCORD_USER_ID != 'SKIP' && format('<@{0}>', steps.op-load-discord.outputs.DISCORD_USER_ID) || '' }}
          status: ${{ steps.status.outputs.result == 'success' && 'success' || 'failure' }}
          title: "🔍 ${{ inputs.repo-name }} • ${{ steps.status.outputs.result == 'success' && 'Validation Passed' || 'Validation Failed' }}"
          description: |
            ${{ steps.status.outputs.result == 'success' && '✅ **All checks passed**' || '❌ **Issues detected**' }}

            **🔒 Secret Scan:** ${{ inputs.gitguardian-result == 'success' && '✅ No secrets detected' || inputs.gitguardian-result == 'skipped' && '⏭️ Skipped (PR/manual)' || '❌ Issues found' }}
            **🛡️ IaC Scan:** ${{ inputs.trivy-result == 'success' && '✅ No misconfigurations' || inputs.trivy-result == 'skipped' && '⏭️ Skipped' || '❌ Issues found' }}
            **⚙️ Workflow Validation:** ${{ inputs.actionlint-result == 'success' && '✅ All workflows valid' || inputs.actionlint-result == 'skipped' && '⏭️ Skipped' || '❌ Issues detected' }}
            **📋 Code Quality:** ${{ inputs.lint-result == 'success' && '✅ All stacks valid' || inputs.lint-result == 'skipped' && '⏭️ Skipped' || '❌ Issues detected' }}

            **📂 Validated Stacks:** `${{ join(fromJson(inputs.stacks), '`, `') }}`

            ${{ github.event_name == 'pull_request' && '🔀 **Pull Request Validation**' || github.event_name == 'workflow_dispatch' && '🔧 **Manual Validation**' || format('📝 **Push to `{0}`**', github.ref_name) }}

            ${{ inputs.gitguardian-result == 'failure' && '
            **🛡️ Security Alert:**
            • GitGuardian detected potential secrets
            • Review the **GitGuardian Scan** job for details
            • Remove exposed secrets before proceeding' || '' }}

            ${{ inputs.trivy-result == 'failure' && '
            **🚨 IaC Misconfiguration:**
            • Trivy detected HIGH or CRITICAL misconfigurations
            • Review the **Trivy IaC Scan** job for details
            • Fix Docker Compose security issues before proceeding' || '' }}

            ${{ inputs.actionlint-result == 'failure' && '
            **⚙️ Workflow Issues:**
            • GitHub Actions workflow validation failed
            • Review the **Workflow Validation** job for details
            • Test locally: `actionlint .github/workflows/*.yml`' || '' }}

            ${{ inputs.lint-result == 'failure' && '
            **📋 Stack Validation:**
            • Review stack validation errors in workflow logs
            • Fix YAML formatting and Docker Compose syntax
            • Test locally: `yamllint --strict stack/compose.yaml`
            • Check the **Lint Summary** job for detailed errors' || '' }}

            ${{ steps.status.outputs.result == 'success' && '🚀 **Ready for deployment**' || '⚠️ **Deployment blocked until issues resolved**' }}
          color: ${{ steps.status.outputs.result == 'success' && 0x28a745 || inputs.gitguardian-result == 'failure' && 0xdc3545 || 0xfd7e14 }}
          username: "Compose Lint"
          avatar_url: "https://cdn-icons-png.flaticon.com/512/2103/2103633.png"

      - name: Unload Discord webhook
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
