---
name: Deploy (Local Self-Hosted)

# Job structure (consolidated 2026-04-30; see runbook for rationale):
#   prepare      → discover stacks, capture previous SHA, classify removed/existing/new
#   deploy       → skip-gate, teardown, tree update, registry login, dockge, all stacks
#   health-check → validate critical stacks (separate job for distinct timeout profile)
#   rollback     → git reset to previous SHA + redeploy on deploy/health failure
#   notify       → Discord notification (always)

on:
  workflow_call:
    inputs:
      runner-label:
        description: "Custom self-hosted runner label (e.g. piwine, piwine-office). Combined with the implicit 'self-hosted' label."
        required: true
        type: string
      live-repo-path:
        description: "Absolute path to the live compose tree on the runner host"
        required: true
        type: string
      live-dockge-path:
        description: "Absolute path to dockge's compose tree (when has-dockge=true)"
        required: false
        type: string
        default: /opt/dockge
      repo-name:
        required: true
        type: string
      webhook-url:
        required: true
        type: string
      discord-user-id:
        required: true
        type: string
      target-ref:
        required: true
        type: string
      has-dockge:
        type: boolean
        default: false
      force-deploy:
        type: boolean
        default: false
      auto-detect-critical:
        type: boolean
        default: true
      critical-services:
        type: string
        default: '[]'
      image-pull-timeout:
        type: number
        default: 600
      service-startup-timeout:
        type: number
        default: 300

permissions:
  contents: read

jobs:
  prepare:
    runs-on: [self-hosted, "${{ inputs.runner-label }}"]
    timeout-minutes: 5
    outputs:
      previous_sha: ${{ steps.previous-sha.outputs.previous_sha }}
      has_previous_sha: ${{ steps.previous-sha.outputs.has_previous_sha }}
      removed_stacks: ${{ steps.detect-changes.outputs.removed_stacks }}
      existing_stacks: ${{ steps.detect-changes.outputs.existing_stacks }}
      new_stacks: ${{ steps.detect-changes.outputs.new_stacks }}
      has_removed_stacks: ${{ steps.detect-changes.outputs.has_removed_stacks }}
      has_existing_stacks: ${{ steps.detect-changes.outputs.has_existing_stacks }}
      has_new_stacks: ${{ steps.detect-changes.outputs.has_new_stacks }}
      critical_stacks: ${{ steps.detect-critical.outputs.critical_stacks }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.target-ref }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: owine/compose-workflow
          ref: main
          path: .compose-workflow

      - name: Capture previous deployment SHA from live tree
        id: previous-sha
        env:
          LIVE_REPO_PATH: ${{ inputs.live-repo-path }}
        run: |
          set -euo pipefail

          if [[ ! -d "$LIVE_REPO_PATH/.git" ]]; then
            echo "❌ LIVE_REPO_PATH '$LIVE_REPO_PATH' is not a git repository (no .git directory found)" >&2
            echo "❌ Verify the runner host has the repo cloned at this path and ownership matches the runner user." >&2
            exit 1
          fi

          CURRENT_SHA=$(git -C "$LIVE_REPO_PATH" rev-parse HEAD)
          if [[ "$CURRENT_SHA" =~ ^[a-fA-F0-9]{40}$ ]]; then
            echo "previous_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
            echo "has_previous_sha=true" >> "$GITHUB_OUTPUT"
            echo "✅ previous_sha=$CURRENT_SHA"
          else
            echo "❌ Live tree HEAD is not a valid 40-character commit SHA: '$CURRENT_SHA'" >&2
            exit 1
          fi

      - name: Get changed files (for removal detection)
        id: changed-files
        if: steps.previous-sha.outputs.previous_sha != inputs.target-ref
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96  # v47.0.6
        with:
          json: true
          sha: ${{ inputs.target-ref }}
          base_sha: ${{ steps.previous-sha.outputs.previous_sha }}

      - name: Discover stacks
        id: discover-stacks
        env:
          DETECTION_TREE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          cd "$DETECTION_TREE"
          stacks=()
          for dir in */; do
            dir_name=$(basename "$dir")
            if [[ -f "$dir/compose.yml" || -f "$dir/compose.yaml" ]]; then
              stacks+=("\"$dir_name\"")
            fi
          done
          if [ ${#stacks[@]} -eq 0 ]; then
            echo "::error::No Docker Compose stacks found in repository"
            exit 1
          fi
          stack_json="[$(IFS=,; echo "${stacks[*]}")]"
          echo "stacks=$stack_json" >> "$GITHUB_OUTPUT"
          echo "✅ Discovered stacks: $stack_json"

      - name: Detect stack changes
        id: detect-changes
        env:
          # Run change detection against the runner's workspace checkout
          # (has full history and authenticated git remote via actions/checkout),
          # NOT against the live tree at inputs.live-repo-path (which has no
          # GitHub credentials when running as the self-hosted runner user).
          DETECTION_TREE: ${{ github.workspace }}
          PREVIOUS_SHA: ${{ steps.previous-sha.outputs.previous_sha }}
          TARGET_REF: ${{ inputs.target-ref }}
          REMOVED_FILES: ${{ steps.changed-files.outputs.deleted_files != '' && steps.changed-files.outputs.deleted_files || '[]' }}
          INPUT_STACKS: ${{ steps.discover-stacks.outputs.stacks }}
        run: |
          ./.compose-workflow/scripts/deployment/detect-stack-changes.sh \
            --mode local \
            --current-sha "$PREVIOUS_SHA" \
            --target-ref "$TARGET_REF" \
            --live-repo-path "$DETECTION_TREE" \
            --input-stacks "$INPUT_STACKS" \
            --removed-files "$REMOVED_FILES"

      - name: Detect critical stacks
        id: detect-critical
        if: inputs.auto-detect-critical
        env:
          DETECTION_TREE: ${{ github.workspace }}
        run: |
          ./.compose-workflow/scripts/deployment/detect-critical-stacks.sh \
            --stacks "${{ join(fromJSON(steps.discover-stacks.outputs.stacks), ' ') }}" \
            --repo-dir "$DETECTION_TREE"

  deploy:
    # Consolidated deploy phase. Replaces 7 prior jobs:
    # teardown-removed, update-tree, registry-login, deploy-dockge,
    # deploy-existing (matrix), deploy-new (matrix), cleanup-failed-new.
    # Single self-hosted runner serializes matrix entries anyway, so the
    # collapse just removes job cold-start overhead with no parallelism loss.
    needs: prepare
    if: always() && needs.prepare.result == 'success'
    runs-on: [self-hosted, "${{ inputs.runner-label }}"]
    timeout-minutes: 60
    outputs:
      skipped: ${{ steps.skip-gate.outputs.skipped }}
      deployed_anything: ${{ steps.summary.outputs.deployed_anything }}
      existing_failed_stacks: ${{ steps.summary.outputs.existing_failed_stacks }}
      new_failed_stacks: ${{ steps.summary.outputs.new_failed_stacks }}
    env:
      LIVE_REPO_PATH: ${{ inputs.live-repo-path }}
      DOCKGE_PATH: ${{ inputs.live-dockge-path }}
      TARGET_REF: ${{ inputs.target-ref }}
      FORCE_DEPLOY: ${{ inputs.force-deploy }}
      SERVICE_STARTUP_TIMEOUT: ${{ inputs.service-startup-timeout }}
      HAS_DOCKGE: ${{ inputs.has-dockge }}
      HAS_REMOVED: ${{ needs.prepare.outputs.has_removed_stacks }}
      HAS_EXISTING: ${{ needs.prepare.outputs.has_existing_stacks }}
      HAS_NEW: ${{ needs.prepare.outputs.has_new_stacks }}
      REMOVED_STACKS: ${{ needs.prepare.outputs.removed_stacks }}
      EXISTING_STACKS: ${{ needs.prepare.outputs.existing_stacks }}
      NEW_STACKS: ${{ needs.prepare.outputs.new_stacks }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - name: Skip gate (already at target SHA?)
        id: skip-gate
        run: |
          set -euo pipefail
          CURRENT_SHA=$(git -C "$LIVE_REPO_PATH" rev-parse HEAD)
          if [[ "$CURRENT_SHA" == "$TARGET_REF" && "$FORCE_DEPLOY" != "true" ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Already at $TARGET_REF; skipping deploy phase"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Teardown removed stacks (uses pre-reset compose files)
        if: |
          steps.skip-gate.outputs.skipped == 'false'
          && env.HAS_REMOVED == 'true'
        run: |
          set -euo pipefail
          for stack in $(echo "$REMOVED_STACKS" | jq -r '.[]'); do
            [[ "$stack" =~ ^[a-zA-Z0-9._-]+$ ]] || { echo "::error::invalid stack name: $stack"; exit 1; }
            compose_file=""
            for ext in yaml yml; do
              if [[ -f "$LIVE_REPO_PATH/$stack/compose.$ext" ]]; then
                compose_file="$LIVE_REPO_PATH/$stack/compose.$ext"
                break
              fi
            done
            if [[ -n "$compose_file" ]]; then
              echo "🛑 Stopping $stack"
              op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- docker compose -f "$compose_file" down || echo "::warning::down failed for $stack"
            else
              echo "::warning::compose file missing for removed stack $stack"
            fi
          done

      # actions/checkout authenticates via GITHUB_TOKEN; the deploy user has no
      # GitHub credentials, so we fetch into the workspace and then sync the
      # live tree from the local workspace (no network auth required).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.skip-gate.outputs.skipped == 'false'
        with:
          fetch-depth: 0
          ref: ${{ inputs.target-ref }}

      - name: Update live tree from local workspace
        if: steps.skip-gate.outputs.skipped == 'false'
        run: |
          set -euo pipefail
          git -C "$LIVE_REPO_PATH" fetch "$GITHUB_WORKSPACE" "$TARGET_REF"
          git -C "$LIVE_REPO_PATH" reset --hard "$TARGET_REF"
          echo "✅ live tree now at $TARGET_REF"

      - name: Configure 1Password Service Account
        if: steps.skip-gate.outputs.skipped == 'false'
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load registry credentials
        id: creds
        if: steps.skip-gate.outputs.skipped == 'false'
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
        env:
          GHCR_USERNAME: op://Docker/ghcr-pat/username
          GHCR_TOKEN: op://Docker/ghcr-pat/pat
          DOCKERHUB_USERNAME: op://Docker/docker-hub/username
          DOCKERHUB_TOKEN: op://Docker/docker-hub/token
          GITLAB_USERNAME: op://Docker/gitlab-registry/username
          GITLAB_TOKEN: op://Docker/gitlab-registry/token
          ZGITLAB_USERNAME: op://Docker/gitlab-container-zenterprise/username
          ZGITLAB_TOKEN: op://Docker/gitlab-container-zenterprise/token

      # Per-registry login is non-fatal (continue-on-error: true). The runner
      # host's ~/.docker/config.json is updated on success; failures warn but
      # don't block the deploy in case cached creds from a prior run still work.
      # logout: false leaves the cached creds in place for downstream steps.
      - name: Login to ghcr.io
        if: steps.skip-gate.outputs.skipped == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ steps.creds.outputs.GHCR_USERNAME }}
          password: ${{ steps.creds.outputs.GHCR_TOKEN }}
          logout: false

      - name: Login to docker.io
        if: steps.skip-gate.outputs.skipped == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        continue-on-error: true
        with:
          username: ${{ steps.creds.outputs.DOCKERHUB_USERNAME }}
          password: ${{ steps.creds.outputs.DOCKERHUB_TOKEN }}
          logout: false

      - name: Login to registry.gitlab.com
        if: steps.skip-gate.outputs.skipped == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        continue-on-error: true
        with:
          registry: registry.gitlab.com
          username: ${{ steps.creds.outputs.GITLAB_USERNAME }}
          password: ${{ steps.creds.outputs.GITLAB_TOKEN }}
          logout: false

      - name: Login to gitlab-container.zenterprise.org
        if: steps.skip-gate.outputs.skipped == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        continue-on-error: true
        with:
          registry: gitlab-container.zenterprise.org
          username: ${{ steps.creds.outputs.ZGITLAB_USERNAME }}
          password: ${{ steps.creds.outputs.ZGITLAB_TOKEN }}
          logout: false

      - name: Deploy dockge
        if: |
          steps.skip-gate.outputs.skipped == 'false'
          && env.HAS_DOCKGE == 'true'
        run: |
          set -euo pipefail
          cd "$DOCKGE_PATH"
          timeout "$SERVICE_STARTUP_TIMEOUT" op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- \
            docker compose up -d --build --pull always --quiet-pull --quiet-build --wait --remove-orphans

      - name: Deploy existing stacks
        id: deploy-existing
        if: |
          steps.skip-gate.outputs.skipped == 'false'
          && env.HAS_EXISTING == 'true'
        run: |
          # Loop with set +e so one stack failure doesn't abort the loop
          # (matches the prior matrix's fail-fast: false). Per-stack timeout
          # via the `timeout` command preserves the matrix's per-entry budget.
          set +e
          failed=()
          succeeded=0
          for stack in $(echo "$EXISTING_STACKS" | jq -r '.[]'); do
            if [[ ! "$stack" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::invalid stack name: $stack"
              failed+=("$stack")
              continue
            fi
            echo "::group::Deploy existing: $stack"
            (
              cd "$LIVE_REPO_PATH/$stack"
              timeout "$SERVICE_STARTUP_TIMEOUT" op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- \
                docker compose up -d --build --pull always --quiet-pull --quiet-build --wait --remove-orphans
            )
            rc=$?
            echo "::endgroup::"
            if [[ $rc -ne 0 ]]; then
              echo "::error::Stack $stack failed (exit $rc)"
              failed+=("$stack")
            else
              succeeded=$((succeeded + 1))
            fi
          done
          # Emit JSON array for downstream consumers; exit non-zero if any failed
          if [[ ${#failed[@]} -gt 0 ]]; then
            json=$(printf '"%s",' "${failed[@]}" | sed 's/,$//')
            echo "failed_stacks=[$json]" >> "$GITHUB_OUTPUT"
            {
              echo "## Existing-stack failures"
              for f in "${failed[@]}"; do echo "- \`$f\`"; done
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "failed_stacks=[]" >> "$GITHUB_OUTPUT"
          fi
          echo "succeeded=$succeeded" >> "$GITHUB_OUTPUT"
          [[ ${#failed[@]} -eq 0 ]]

      - name: Deploy new stacks
        id: deploy-new
        # Only attempt new stacks if existing stacks succeeded (preserves the
        # prior cross-job dependency). If existing failed, new is skipped and
        # the rollback path runs.
        if: |
          steps.skip-gate.outputs.skipped == 'false'
          && env.HAS_NEW == 'true'
          && (steps.deploy-existing.outcome == 'success' || steps.deploy-existing.outcome == 'skipped')
        run: |
          set +e
          failed=()
          succeeded=0
          for stack in $(echo "$NEW_STACKS" | jq -r '.[]'); do
            if [[ ! "$stack" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::invalid stack name: $stack"
              failed+=("$stack")
              continue
            fi
            echo "::group::Deploy new: $stack"
            (
              cd "$LIVE_REPO_PATH/$stack"
              timeout "$SERVICE_STARTUP_TIMEOUT" op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- \
                docker compose up -d --build --pull always --quiet-pull --quiet-build --wait --remove-orphans
            )
            rc=$?
            echo "::endgroup::"
            if [[ $rc -ne 0 ]]; then
              echo "::error::Stack $stack failed (exit $rc)"
              failed+=("$stack")
            else
              succeeded=$((succeeded + 1))
            fi
          done
          if [[ ${#failed[@]} -gt 0 ]]; then
            json=$(printf '"%s",' "${failed[@]}" | sed 's/,$//')
            echo "failed_stacks=[$json]" >> "$GITHUB_OUTPUT"
            {
              echo "## New-stack failures"
              for f in "${failed[@]}"; do echo "- \`$f\`"; done
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "failed_stacks=[]" >> "$GITHUB_OUTPUT"
          fi
          echo "succeeded=$succeeded" >> "$GITHUB_OUTPUT"
          [[ ${#failed[@]} -eq 0 ]]

      - name: Cleanup new stacks on failure
        # Tears down ALL new stacks (not just failed ones) so docker doesn't
        # have orphan containers when rollback's git-reset removes their
        # compose dirs. Matches the prior cleanup-failed-new behavior.
        if: |
          always()
          && steps.deploy-new.outcome == 'failure'
        run: |
          set +e
          for stack in $(echo "$NEW_STACKS" | jq -r '.[]'); do
            [[ "$stack" =~ ^[a-zA-Z0-9._-]+$ ]] || { echo "::warning::skipping invalid stack: $stack"; continue; }
            cd "$LIVE_REPO_PATH/$stack" 2>/dev/null || continue
            op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- docker compose down || true
          done

      - name: Compute deploy summary outputs
        id: summary
        if: always()
        env:
          EXISTING_OUTCOME: ${{ steps.deploy-existing.outcome }}
          NEW_OUTCOME: ${{ steps.deploy-new.outcome }}
          EXISTING_FAILED: ${{ steps.deploy-existing.outputs.failed_stacks }}
          NEW_FAILED: ${{ steps.deploy-new.outputs.failed_stacks }}
          EXISTING_SUCCEEDED: ${{ steps.deploy-existing.outputs.succeeded }}
          NEW_SUCCEEDED: ${{ steps.deploy-new.outputs.succeeded }}
        run: |
          set -euo pipefail
          # deployed_anything: at least one stack was deployed successfully.
          # Health-check uses this to decide whether to run.
          deployed_anything="false"
          if [[ "${EXISTING_SUCCEEDED:-0}" -gt 0 || "${NEW_SUCCEEDED:-0}" -gt 0 ]]; then
            deployed_anything="true"
          fi
          {
            echo "deployed_anything=$deployed_anything"
            echo "existing_failed_stacks=${EXISTING_FAILED:-[]}"
            echo "new_failed_stacks=${NEW_FAILED:-[]}"
          } >> "$GITHUB_OUTPUT"

  health-check:
    needs: [prepare, deploy]
    if: |
      always()
      && needs.deploy.result == 'success'
      && needs.deploy.outputs.deployed_anything == 'true'
    runs-on: [self-hosted, "${{ inputs.runner-label }}"]
    timeout-minutes: 5
    outputs:
      status: ${{ steps.h.outputs.status }}
    env:
      LIVE_REPO_PATH: ${{ inputs.live-repo-path }}
      CRITICAL_STACKS: ${{ inputs.auto-detect-critical && needs.prepare.outputs.critical_stacks || inputs.critical-services }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - name: Health check critical stacks
        id: h
        run: |
          set -euo pipefail
          CRITICAL_STACKS="${CRITICAL_STACKS:-[]}"
          failed=()
          for stack in $(echo "$CRITICAL_STACKS" | jq -r '.[]'); do
            cd "$LIVE_REPO_PATH/$stack"
            services=$(op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- docker compose ps -a --format json | jq -s '.')
            # Unhealthy if: explicit "unhealthy", non-running with no healthcheck (and not a clean one-shot exit),
            # or exited with non-zero code. Exited+0 is a one-shot success (e.g. alembic migrations gated via
            # service_completed_successfully) and must not fail the gate.
            unhealthy=$(echo "$services" | jq -r '
              [.[] | select(
                .Health == "unhealthy"
                or (.Health == "" and .State != "running" and .State != "exited")
                or (.State == "exited" and (.ExitCode // 0) != 0)
              )] | length')
            if [[ "$unhealthy" -gt 0 ]]; then
              failed+=("$stack")
              echo "::error::Critical stack $stack has $unhealthy unhealthy services"
              op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- docker compose logs --tail 50
            fi
          done
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=healthy" >> "$GITHUB_OUTPUT"

  rollback:
    needs: [prepare, deploy, health-check]
    if: |
      always()
      && needs.prepare.outputs.has_previous_sha == 'true'
      && (needs.deploy.result == 'failure' || needs.health-check.result == 'failure')
    runs-on: [self-hosted, "${{ inputs.runner-label }}"]
    timeout-minutes: 15
    env:
      LIVE_REPO_PATH: ${{ inputs.live-repo-path }}
      PREVIOUS_SHA: ${{ needs.prepare.outputs.previous_sha }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - name: Tear down new stacks (will not exist after reset)
        if: needs.prepare.outputs.has_new_stacks == 'true'
        env:
          NEW_STACKS: ${{ needs.prepare.outputs.new_stacks }}
        run: |
          set -euo pipefail
          for stack in $(echo "$NEW_STACKS" | jq -r '.[]'); do
            [[ "$stack" =~ ^[a-zA-Z0-9._-]+$ ]] || { echo "::error::invalid stack name: $stack"; exit 1; }
            compose_file=""
            for ext in yaml yml; do
              if [[ -f "$LIVE_REPO_PATH/$stack/compose.$ext" ]]; then
                compose_file="$LIVE_REPO_PATH/$stack/compose.$ext"
                break
              fi
            done
            if [[ -n "$compose_file" ]]; then
              echo "🛑 Tearing down new stack $stack before rollback"
              op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- docker compose -f "$compose_file" down || echo "::warning::down failed for $stack"
            fi
          done

      - name: Reset live tree to previous SHA
        run: git -C "$LIVE_REPO_PATH" reset --hard "$PREVIOUS_SHA"

      - name: Redeploy stacks at previous SHA
        run: |
          set -euo pipefail
          for stack_dir in "$LIVE_REPO_PATH"/*/; do
            [[ -f "$stack_dir/compose.yaml" || -f "$stack_dir/compose.yml" ]] || continue
            cd "$stack_dir"
            op run --no-masking --env-file="$LIVE_REPO_PATH/compose.env" -- \
              docker compose up -d --build --pull always --quiet-pull --quiet-build --wait --remove-orphans \
              || echo "::warning::rollback up failed for $stack_dir"
          done

  notify:
    name: Discord Notification
    needs:
      - prepare
      - deploy
      - health-check
      - rollback
    if: always()
    runs-on: [self-hosted, "${{ inputs.runner-label }}"]
    timeout-minutes: 5
    steps:
      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Get commit message
        id: commit-msg
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TARGET_REF: ${{ inputs.target-ref }}
        run: |
          set -euo pipefail
          COMMIT_MSG=$(gh api "repos/$GH_REPO/commits/$TARGET_REF" \
            --jq '.commit.message // "No commit message available"' | head -1)
          SHORT_SHA="${TARGET_REF:0:7}"
          {
            echo "message=$COMMIT_MSG"
            echo "short-sha=$SHORT_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Compute notification status
        id: status
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_SKIPPED: ${{ needs.deploy.outputs.skipped }}
          HEALTH_RESULT: ${{ needs.health-check.result }}
          HEALTH_STATUS: ${{ needs.health-check.outputs.status }}
          ROLLBACK_RESULT: ${{ needs.rollback.result }}
          HAS_REMOVED: ${{ needs.prepare.outputs.has_removed_stacks }}
          HAS_EXISTING: ${{ needs.prepare.outputs.has_existing_stacks }}
          HAS_NEW: ${{ needs.prepare.outputs.has_new_stacks }}
          REMOVED_STACKS: ${{ needs.prepare.outputs.removed_stacks }}
          FORCE_DEPLOY: ${{ inputs.force-deploy }}
        run: |
          set -euo pipefail

          # Determine if any deployment work happened.
          deployment_needed="true"
          if [[ "$HAS_REMOVED" != "true" && "$HAS_EXISTING" != "true" && "$HAS_NEW" != "true" ]]; then
            deployment_needed="false"
          elif [[ "${DEPLOY_RESULT:-}" == "success" && "${DEPLOY_SKIPPED:-}" == "true" && "${FORCE_DEPLOY:-}" != "true" ]]; then
            deployment_needed="false"
          fi

          # Deploy phase aggregate: just the consolidated job's result.
          deploy_status="success"
          if [[ "$DEPLOY_RESULT" == "failure" ]]; then
            deploy_status="failure"
          fi

          # Health status (default to success if skipped/empty).
          # The health-check job emits "healthy" / "failed" (semantic) via its
          # outputs.status; the rest of this script compares against
          # "success" / "failure". Normalize here so both vocabularies map.
          raw_health="${HEALTH_STATUS:-}"
          case "$raw_health" in
            healthy|success) health_status="success" ;;
            failed|failure)  health_status="failure" ;;
            "")
              if [[ "$HEALTH_RESULT" == "success" || "$HEALTH_RESULT" == "skipped" ]]; then
                health_status="success"
              else
                health_status="failure"
              fi
              ;;
            *) health_status="failure" ;;
          esac

          rollback_status="$ROLLBACK_RESULT"

          # Final overall status
          if [[ "$deployment_needed" == "false" ]]; then
            overall="no-changes"
            title_suffix="No Changes"
            description="📋 **Repository already at target commit**"
            color="7105644"   # 0x6c757d gray
          elif [[ "$deploy_status" == "success" && "$health_status" == "success" ]]; then
            overall="success"
            if [[ "$FORCE_DEPLOY" == "true" ]]; then
              description="🔄 **Force deployment completed successfully**"
            else
              description="✅ **Deployment completed successfully**"
            fi
            title_suffix="Deployed"
            color="2664261"   # 0x28a745 green
          elif [[ "$rollback_status" == "success" ]]; then
            overall="rolled-back"
            title_suffix="Rolled Back"
            description="🔄 **Deployment failed but rolled back successfully**"
            color="16763904"  # 0xffc107 yellow
          else
            overall="failure"
            title_suffix="Failed"
            description="❌ **Deployment failed**"
            color="14431557"  # 0xdc3545 red
          fi

          {
            echo "deployment_needed=$deployment_needed"
            echo "deploy_status=$deploy_status"
            echo "health_status=$health_status"
            echo "rollback_status=$rollback_status"
            echo "overall=$overall"
            echo "title_suffix=$title_suffix"
            echo "description<<EOF"
            echo "$description"
            echo "EOF"
            echo "color=$color"
          } >> "$GITHUB_OUTPUT"

          # Pipeline status line
          deploy_icon="✅"; [[ "$deploy_status" != "success" ]] && deploy_icon="❌"
          health_icon="✅"
          if [[ "$HEALTH_RESULT" == "skipped" ]]; then
            health_icon="⏭️"
          elif [[ "$health_status" != "success" ]]; then
            health_icon="❌"
          fi
          rollback_line=""
          if [[ "$rollback_status" != "skipped" ]]; then
            rb_icon="✅"; [[ "$rollback_status" != "success" ]] && rb_icon="❌"
            rollback_line=" → $rb_icon Rollback"
          fi
          pipeline="$deploy_icon Deploy → $health_icon Health$rollback_line"
          {
            echo "pipeline<<EOF"
            echo "$pipeline"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Removed stacks line
          removed_line=""
          if [[ "$HAS_REMOVED" == "true" ]]; then
            removed_names=$(echo "$REMOVED_STACKS" | jq -r '. | join(", ")' 2>/dev/null || echo "")
            if [[ -n "$removed_names" ]]; then
              removed_line="🗑️ **Removed stacks:** $removed_names"
            fi
          fi
          {
            echo "removed_line<<EOF"
            echo "$removed_line"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Load Discord webhook and user ID
        id: op-load-discord
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
        env:
          DISCORD_WEBHOOK: ${{ inputs.webhook-url }}
          DISCORD_USER_ID: ${{ inputs.discord-user-id != '' && inputs.discord-user-id || 'SKIP' }}

      - name: Send Discord notification
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1.16.0
        with:
          webhook: ${{ steps.op-load-discord.outputs.DISCORD_WEBHOOK }}
          content: ${{ (steps.status.outputs.overall == 'failure' || steps.status.outputs.overall == 'rolled-back') && inputs.discord-user-id != '' && steps.op-load-discord.outputs.DISCORD_USER_ID != 'SKIP' && format('<@{0}>', steps.op-load-discord.outputs.DISCORD_USER_ID) || '' }}
          status: ${{ (steps.status.outputs.overall == 'success' || steps.status.outputs.overall == 'no-changes') && 'success' || 'failure' }}
          title: "🚀 ${{ inputs.repo-name }} • ${{ steps.status.outputs.title_suffix }}"
          description: |
            ${{ steps.status.outputs.description }}

            ${{ steps.status.outputs.removed_line }}

            ${{ steps.status.outputs.deployment_needed == 'true' && format('**🔄 Pipeline Status**
            {0}', steps.status.outputs.pipeline) || '' }}

            ${{ github.event_name == 'workflow_dispatch' && '🔧 **Triggered manually**' || format('📝 **Commit:** [`{0}`](https://github.com/{1}/commit/{2}) {3}', steps.commit-msg.outputs.short-sha, github.repository, inputs.target-ref, steps.commit-msg.outputs.message) }}
          color: ${{ steps.status.outputs.color }}
          username: "Compose Deploy"
          avatar_url: "https://cdn-icons-png.flaticon.com/512/919/919853.png"

      - name: Unload Discord webhook
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259  # v4.0.0
        with:
          unset-previous: true
